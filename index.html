<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERA SOVEREIGN | Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header><h1>ERA SOVEREIGN SYSTEM</h1></header>

<div id="auth-screen" class="container" style="text-align:center; padding-top:100px;">
    <div class="card" style="max-width:350px; margin:auto;">
        <h2 class="title-font">Acesso Acadêmico</h2>
        <div id="reg-box" style="display:none"><input type="text" id="reg-nome" placeholder="Nome Completo"></div>
        <input type="email" id="u-email" placeholder="E-mail">
        <input type="password" id="u-pass" placeholder="Senha">
        <button id="btn-auth-action" class="btn-gold">Entrar</button>
        <p id="toggle-auth" style="cursor:pointer; font-size:10px; text-decoration:underline; margin-top:10px">Não tem conta? Registrar</p>
    </div>
</div>

<nav class="nav-bar" id="main-nav" style="display:none">
    <button class="nav-btn active" data-tab="home">CONTA</button>
    <button class="nav-btn" data-tab="notifs">AVISOS</button>
    <button class="nav-btn" data-tab="editorial">EDITORIAL</button>
    <button class="nav-btn" data-tab="finance">FINANÇAS</button>
    <button class="nav-btn" data-tab="transfer">PAGAR</button>
    <button class="nav-btn" data-tab="market">MERCADO</button>
    <button class="nav-btn" data-tab="jobs">VAGAS</button>
    <button class="nav-btn" data-tab="ranking">ELITE</button>
    <button class="nav-btn btn-gold-nav" id="adm-tab-btn" style="display:none" data-tab="reitoria">REITORIA</button>
</nav>

<div class="container" id="app-wrap" style="display:none">
    <div id="home" class="section active"></div>
    <div id="notifs" class="section"></div>
    <div id="editorial" class="section">
        <div id="news-feed"></div>
    </div>
    <div id="finance" class="section">
        <div class="card" style="text-align:center">
            <h3>Financiamento</h3>
            <h2 id="display-divida" style="color:var(--alert)">$ 0</h2>
            <button id="btn-loan" class="btn-gold">Solicitar Empréstimo</button>
        </div>
    </div>
    <div id="transfer" class="section">
        <div class="card">
            <h3>Transferir</h3>
            <select id="tr-dest"></select>
            <input type="number" id="tr-val" placeholder="Valor $">
            <button id="btn-send-money" class="btn-gold">Enviar</button>
        </div>
    </div>
    <div id="market" class="section"><div id="market-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px"></div></div>
    <div id="jobs" class="section"><div id="jobs-list"></div></div>
    <div id="ranking" class="section"><div id="rank-list"></div></div>
    
    <div id="reitoria" class="section">
        <div class="card" style="background:var(--wine); text-align:center">
            <button id="btn-cycle" style="background:none; color:white; font-weight:bold">🔄 GIRAR CICLO ACADÊMICO</button>
        </div>
        <div id="adm-content">
            <div class="card">
                <h3>Gestão de Aluno</h3>
                <select id="adm-p-sel"></select>
                <input type="text" id="adm-tag-n" placeholder="Nova Tag">
                <button id="btn-add-tag">Adicionar Tag</button>
            </div>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
