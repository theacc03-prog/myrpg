<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERA ACADEMY | Sovereign System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --prata: #C0C0C0;
            --azul-royal: #0A192F;
            --azul-card: #112240;
            --white: #F8F9FA;
            --gold: #D4AF37;
            --red: #8B0000;
            --glass: rgba(192, 192, 192, 0.05);
        }

        body { background: var(--azul-royal); color: var(--white); font-family: 'Montserrat', sans-serif; margin: 0; min-height: 100vh; }
        header { padding: 30px; text-align: center; background: #02060C; border-bottom: 2px solid var(--prata); }
        h1 { font-family: 'Cinzel', serif; color: var(--prata); letter-spacing: 4px; margin: 0; }
        
        nav { display: none; background: #050A14; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid var(--glass); justify-content: center; position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: none; border: none; color: var(--prata); padding: 15px; font-size: 10px; font-weight: bold; cursor: pointer; opacity: 0.6; }
        .nav-btn.active { opacity: 1; border-bottom: 2px solid var(--prata); }

        .container { max-width: 900px; margin: 20px auto; padding: 0 20px 100px; }
        .card { background: var(--azul-card); border: 1px solid var(--glass); border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .balance { font-family: 'Cinzel'; font-size: 3rem; color: var(--prata); margin: 10px 0; }
        .tag { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; margin: 2px; display: inline-block; }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #02060C; border: 1px solid #1d3557; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--prata); color: var(--azul-royal); border: none; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.2); }
        .btn-sec { background: none; border: 1px solid var(--prata); color: var(--prata); }
        
        .hidden { display: none; }
        .grid-market { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .item-card { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px solid var(--glass); text-align: center; }
    </style>
</head>
<body>

<header>
    <img src="era.png" alt="" style="max-height:80px; margin-bottom:10px" onerror="this.style.display='none'">
    <h1>ERA ACADEMY</h1>
    <p style="font-size: 10px; letter-spacing: 2px; opacity: 0.6;">SOVEREIGN SYSTEM</p>
</header>

<div id="auth-screen" class="container">
    <div class="card" id="login-box" style="max-width:400px; margin:auto">
        <h2 style="font-family:'Cinzel'">Acesso de Elite</h2>
        <input type="email" id="email" placeholder="E-mail Acadêmico">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="authAction('login')">Entrar</button>
        <button class="btn-sec" style="margin-top:10px" onclick="toggleAuth()">Solicitar Matrícula</button>
    </div>
    <div class="card hidden" id="register-box" style="max-width:400px; margin:auto">
        <h2 style="font-family:'Cinzel'">Matrícula</h2>
        <input type="text" id="reg-name" placeholder="Nome do Personagem">
        <input type="email" id="reg-email" placeholder="E-mail">
        <input type="password" id="reg-pass" placeholder="Senha">
        <button onclick="authAction('register')">Registrar</button>
        <button class="btn-sec" style="margin-top:10px" onclick="toggleAuth()">Voltar</button>
    </div>
</div>

<nav id="main-nav">
    <button class="nav-btn active" onclick="showTab('tab-dash', this)">DASHBOARD</button>
    <button class="nav-btn" onclick="showTab('tab-notif', this)">NOTIFICAÇÕES</button>
    <button class="nav-btn" onclick="showTab('tab-news', this)">EDITORIAL</button>
    <button class="nav-btn" onclick="showTab('tab-finan', this)">FINANÇAS</button>
    <button class="nav-btn" onclick="showTab('tab-mercado', this)">MERCADO</button>
    <button class="nav-btn" onclick="showTab('tab-transf', this)">TRANSFERIR</button>
    <button class="nav-btn" onclick="showTab('tab-rank', this)">RANKING</button>
    <button class="nav-btn" onclick="showTab('tab-vagas', this)">VAGAS</button>
    <button class="nav-btn" id="btn-adm" style="color:var(--gold); display:none" onclick="showTab('tab-adm', this)">REITORIA</button>
</nav>

<div id="app-content" class="container hidden">
    <div id="tab-dash" class="tab">
        <div class="card">
            <div style="text-align:right"><button class="btn-sec" style="width:auto; padding:5px 10px" onclick="document.getElementById('set-box').classList.toggle('hidden')">⚙️ SETTINGS</button></div>
            <img id="u-foto" src="" style="width:120px; height:120px; border-radius:50%; border:2px solid var(--prata); object-fit:cover">
            <h2 id="u-nome" style="font-family:'Cinzel'">---</h2>
            <div id="u-tags"></div>
            <div class="balance" id="u-saldo">$ 0</div>
            
            <div id="set-box" class="hidden" style="margin-top:20px; border-top:1px solid var(--glass); padding-top:20px">
                <input type="text" id="edit-nome" placeholder="Novo Nome">
                <input type="text" id="edit-foto" placeholder="URL da Foto">
                <textarea id="edit-bio" placeholder="Sua biografia..."></textarea>
                <button onclick="saveProfile()">Salvar Alterações</button>
                <button class="btn-sec" style="margin-top:10px" onclick="authAction('logout')">Sair da Conta</button>
                <button style="background:var(--red); color:white; margin-top:10px" onclick="delAccount()">Excluir Matrícula</button>
            </div>
        </div>
        <div class="card">
            <h3 style="font-family:'Cinzel'">🎒 INVENTÁRIO ATIVO</h3>
            <div id="u-inv" class="grid-market"></div>
        </div>
    </div>

    <div id="tab-news" class="tab hidden">
        <h2 style="font-family:'Cinzel'">Mural Academy</h2>
        <div id="news-list"></div>
    </div>

    <div id="tab-finan" class="tab hidden">
        <div class="card">
            <h2 style="font-family:'Cinzel'">Crédito Acadêmico</h2>
            <p>Taxa Semanal: <b>10%</b></p>
            <p>Dívida Atual: <b id="u-divida" style="color:var(--red)">$ 0</b></p>
            <input type="number" id="loan-val" placeholder="Valor do Empréstimo">
            <button onclick="requestLoan()">Solicitar Financiamento</button>
            <hr style="opacity:0.1; margin:20px 0">
            <button class="btn-sec" onclick="alert('Procure a Reitoria para parcelamento')">Negociar Parcelas</button>
        </div>
    </div>

    <div id="tab-mercado" class="tab hidden">
        <h2 style="font-family:'Cinzel'">Itens de Prestígio</h2>
        <div id="market-list" class="grid-market"></div>
    </div>

    <div id="tab-adm" class="tab hidden">
        <div class="card" style="border-color:var(--gold)">
            <h2 style="color:var(--gold); font-family:'Cinzel'">Comando Superior</h2>
            <button onclick="girarCiclo()" style="background:var(--azul-royal); color:var(--prata); border:1px solid var(--prata); margin-bottom:15px">⏩ GIRAR CICLO ACADÊMICO</button>
            
            <h3 style="font-size:12px">POSTAR NOTÍCIA</h3>
            <input type="text" id="adm-news-t" placeholder="Título">
            <input type="text" id="adm-news-i" placeholder="URL Imagem">
            <textarea id="adm-news-x" placeholder="Texto..."></textarea>
            <button onclick="admPostNews()">Publicar Notícia</button>

            <h3 style="font-size:12px; margin-top:20px">GESTÃO DE JOGADOR</h3>
            <select id="adm-p-list"></select>
            <input type="number" id="adm-p-val" placeholder="Valor (+ ou -)">
            <input type="text" id="adm-p-tag" placeholder="Nova Tag">
            <input type="color" id="adm-p-color" value="#C0C0C0">
            <button onclick="admAdjustPlayer()">Aplicar Mudanças</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, deleteUser } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
    import { getDatabase, ref, set, get, update, onValue, remove, push } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBt7zjlI1P8lN4JxnxTe_erzNbfu1AHdfE",
        authDomain: "universityerarpg-6a29d.firebaseapp.com",
        databaseURL: "https://universityerarpg-6a29d-default-rtdb.firebaseio.com",
        projectId: "universityerarpg-6a29d",
        storageBucket: "universityerarpg-6a29d.firebasestorage.app",
        messagingSenderId: "912095174573",
        appId: "1:912095174573:web:e4591c65eeb9259ba9cb24"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // --- NAVEGAÇÃO ---
    window.toggleAuth = () => { document.getElementById('login-box').classList.toggle('hidden'); document.getElementById('register-box').classList.toggle('hidden'); };
    window.showTab = (id, btn) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        btn.classList.add('active');
    };

    // --- AUTH ---
    window.authAction = async (t) => {
        try {
            if(t==='login') await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
            if(t==='register'){
                const n = document.getElementById('reg-name').value;
                const e = document.getElementById('reg-email').value;
                const p = document.getElementById('reg-pass').value;
                const r = await createUserWithEmailAndPassword(auth, e, p);
                await set(ref(db, `jogadores/${r.user.uid}`), { nome:n, email:e, saldo:1500, divida:0, role:'aluno', foto:'', bio:'', despesa:200, lucro:500 });
            }
            if(t==='logout'){ await signOut(auth); location.reload(); }
        } catch(e){ alert(e.message); }
    };

    onAuthStateChanged(auth, user => {
        if(user){
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-nav').style.display = 'flex';
            document.getElementById('app-content').classList.remove('hidden');
            
            onValue(ref(db, `jogadores/${user.uid}`), snap => {
                const d = snap.val();
                if(d){
                    document.getElementById('u-nome').innerText = d.nome;
                    document.getElementById('u-saldo').innerText = `$ ${d.saldo.toLocaleString()}`;
                    document.getElementById('u-divida').innerText = `$ ${d.divida.toLocaleString()}`;
                    document.getElementById('u-foto').src = d.foto || "https://placehold.co/150/0A192F/C0C0C0?text=ERA";
                    if(d.role === 'reitora' || d.role === 'admin') document.getElementById('btn-adm').style.display='block';
                }
            });
            loadNews();
            loadMarket();
            loadPlayersList();
        }
    });

    // --- REITORIA ACTIONS ---
    window.admPostNews = async () => {
        const n = { titulo: document.getElementById('adm-news-t').value, img: document.getElementById('adm-news-i').value, txt: document.getElementById('adm-news-x').value, data: new Date().toLocaleDateString() };
        await push(ref(db, 'editorial'), n);
        alert("Publicado!");
    };

    function loadNews() {
        onValue(ref(db, 'editorial'), snap => {
            let h = "";
            snap.forEach(c => {
                const n = c.val();
                h += `<div class="card">${n.img?`<img src="${n.img}" style="width:100%; border-radius:8px">`:''}<h3>${n.titulo}</h3><p>${n.txt}</p></div>`;
            });
            document.getElementById('news-list').innerHTML = h || "Sem notícias.";
        });
    }

    function loadMarket() {
        onValue(ref(db, 'mercado'), snap => {
            let h = "";
            snap.forEach(c => {
                const i = c.val();
                h += `<div class="item-card"><img src="${i.img}" style="width:50px"><h4>${i.nome}</h4><p>$ ${i.preco}</p><button onclick="buy('${c.key}')">Comprar</button></div>`;
            });
            document.getElementById('market-list').innerHTML = h;
        });
    }

    window.girarCiclo = async () => {
        if(!confirm("Girar ciclo (Salários, Juros e Despesas)?")) return;
        const snap = await get(ref(db, 'jogadores'));
        snap.forEach(p => {
            const d = p.val();
            const novoSaldo = d.saldo + (d.lucro || 0) - (d.despesa || 0);
            const novaDivida = d.divida * 1.1; // Juros de 10%
            update(ref(db, `jogadores/${p.key}`), { saldo: novoSaldo, divida: novaDivida });
        });
        alert("Ciclo Concluído!");
    };

</script>
</body>
</html>
