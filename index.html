<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERA ACADEMY | Sovereign System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --navy: #050A14;
            --glass: rgba(255, 255, 255, 0.03);
            --white: #E0E1DD;
            --red: #8B0000;
        }

        body {
            background: var(--navy);
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Header & Branding --- */
        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #000, var(--navy));
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .logo-top {
            max-height: 120px; /* Tamanho médio da logo */
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); /* Sombra dourada suave */
        }

        h1 {
            font-family: 'Cinzel', serif;
            letter-spacing: 5px;
            font-size: 1.5rem;
            margin: 0;
            color: var(--gold);
        }

        /* --- Telas de Acesso --- */
        .auth-container {
            max-width: 350px;
            margin: 50px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0,0,0,0.5);
            border: 1px solid #1a2233;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--gold);
            color: black;
            border: none;
            font-weight: 700;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        button:hover { filter: brightness(1.2); }

        .btn-outline {
            background: none;
            color: var(--gold);
            border: 1px solid var(--gold);
            font-size: 10px;
            margin-top: 20px;
        }

        /* --- Sistema Principal --- */
        nav {
            display: none;
            justify-content: center;
            background: #000;
            padding: 10px;
            border-bottom: 1px solid var(--glass);
            flex-wrap: wrap;
        }

        .nav-btn {
            background: none;
            color: var(--white);
            font-size: 10px;
            width: auto;
            padding: 10px 15px;
            opacity: 0.6;
        }

        .nav-btn.active {
            opacity: 1;
            color: var(--gold);
            border-bottom: 1px solid var(--gold);
        }

        .content {
            display: none;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--glass);
            margin-bottom: 20px;
            text-align: center;
        }

        .balance-text {
            font-size: 3rem;
            font-family: 'Cinzel';
            color: var(--gold);
            margin: 10px 0;
        }

        .btn-danger { background: var(--red); color: white; margin-top: 20px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <img id="header-logo" src="" alt="ERA Logo" class="logo-top hidden">
    <h1 id="main-title">ERA ACADEMY</h1>
    <p style="font-size: 9px; opacity: 0.5; letter-spacing: 2px;">SOVEREIGN MANAGEMENT SYSTEM</p>
</header>

<div id="auth-box" class="auth-container">
    <div id="login-fields">
        <h2 style="font-family: 'Cinzel'; font-size: 18px;">Acesso de Elite</h2>
        <input type="email" id="email" placeholder="E-mail Acadêmico">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="handleAuth('login')">Entrar no Sistema</button>
    </div>

    <div id="register-fields" class="hidden">
        <h2 style="font-family: 'Cinzel'; font-size: 18px;">Nova Matrícula</h2>
        <input type="text" id="reg-nome" placeholder="Nome Completo">
        <input type="email" id="reg-email" placeholder="E-mail para Registro">
        <input type="password" id="reg-pass" placeholder="Senha">
        <button onclick="handleAuth('register')">Concluir Matrícula</button>
    </div>

    <button class="btn-outline" id="toggle-auth" onclick="toggleAuthMode()">Não possui conta? Solicite aqui</button>
</div>

<nav id="main-nav">
    <button class="nav-btn active" onclick="showTab('tab-conta', this)">CONTA</button>
    <button class="nav-btn" onclick="showTab('tab-elite', this)">ELITE</button>
    <button class="nav-btn" onclick="showTab('tab-mercado', this)">MERCADO</button>
    <button class="nav-btn" id="reitoria-btn" style="display:none; color: var(--gold)" onclick="showTab('tab-reitoria', this)">REITORIA</button>
</nav>

<div id="app-content">
    <div id="tab-conta" class="content">
        <div class="card">
            <div id="profile-pic" style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold); margin: 0 auto 15px; background: #000; overflow: hidden;">
                <img id="my-avatar" src="" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <h2 id="my-name" class="title-font" style="margin:0">Carregando...</h2>
            <div id="my-balance" class="balance-text">$ 0</div>
            
            <div id="edit-mode" class="hidden">
                <input type="text" id="new-name" placeholder="Novo Nome">
                <input type="text" id="new-pic" placeholder="URL da Foto">
                <button onclick="saveProfile()" class="btn-outline">Confirmar Alterações</button>
            </div>
            
            <button onclick="document.getElementById('edit-mode').classList.toggle('hidden')" class="btn-outline">Editar Perfil</button>
            <button onclick="handleAuth('logout')" style="background: #222; color: white;">Encerrar Sessão</button>
            <button onclick="deleteAccount()" class="btn-danger">Excluir Matrícula Permanentemente</button>
        </div>
    </div>

    <div id="tab-elite" class="content">
        <h2 style="font-family: 'Cinzel'; text-align: center;">Sociedade de Elite</h2>
        <div id="ranking-list"></div>
    </div>

    <div id="tab-mercado" class="content">
        <h2 style="font-family: 'Cinzel'; text-align: center;">Mercado Acadêmico</h2>
        <div id="store-list"></div>
    </div>
</div>

<script type="module">
    // --- LÓGICA DA LOGO ---
    // Força o caminho relativo correto para o GitHub Pages
    const logoImg = document.getElementById('header-logo');
    logoImg.src = window.location.origin + window.location.pathname.replace('index.html', '') + 'era.png';
    logoImg.classList.remove('hidden'); // Mostra a logo após carregar o caminho

    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, deleteUser } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
    import { getDatabase, ref, set, get, update, onValue, remove } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBt7zjlI1P8lN4JxnxTe_erzNbfu1AHdfE",
        authDomain: "universityerarpg-6a29d.firebaseapp.com",
        databaseURL: "https://universityerarpg-6a29d-default-rtdb.firebaseio.com",
        projectId: "universityerarpg-6a29d",
        storageBucket: "universityerarpg-6a29d.firebasestorage.app",
        messagingSenderId: "912095174573",
        appId: "1:912095174573:web:e4591c65eeb9259ba9cb24"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let uLog = null;

    // --- FUNÇÕES DE NAVEGAÇÃO ---
    window.toggleAuthMode = () => {
        const isLogin = document.getElementById('login-fields').classList.toggle('hidden');
        document.getElementById('register-fields').classList.toggle('hidden');
        document.getElementById('toggle-auth').innerText = isLogin ? "Já possui conta? Acessar" : "Não possui conta? Solicite aqui";
    }

    window.showTab = (tabId, btn) => {
        document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).style.display = 'block';
        if(btn) btn.classList.add('active');
    }

    // --- AUTENTICAÇÃO ---
    window.handleAuth = async (mode) => {
        try {
            if (mode === 'login') {
                const e = document.getElementById('email').value;
                const p = document.getElementById('pass').value;
                await signInWithEmailAndPassword(auth, e, p);
            } 
            else if (mode === 'register') {
                const n = document.getElementById('reg-nome').value;
                const e = document.getElementById('reg-email').value;
                const p = document.getElementById('reg-pass').value;
                if(!n) return alert("Nome é obrigatório.");
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await set(ref(db, `jogadores/${res.user.uid}`), {
                    nome: n, saldo: 1500, role: 'aluno', bio: '', foto: ''
                });
            } 
            else if (mode === 'logout') {
                await signOut(auth);
                location.reload();
            }
        } catch (err) {
            alert("Erro no Sistema: " + err.message);
        }
    }

    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('main-nav').style.display = 'flex';
            onValue(ref(db, `jogadores/${user.uid}`), snap => {
                if(snap.exists()) {
                    uLog = { id: user.uid, ...snap.val() };
                    document.getElementById('my-name').innerText = uLog.nome;
                    document.getElementById('my-balance').innerText = `$ ${uLog.saldo.toLocaleString()}`;
                    document.getElementById('my-avatar').src = uLog.foto || "https://placehold.co/100?text=Sovereign";
                    showTab('tab-conta');
                    carregarRanking();
                }
            });
        }
    });

    // --- AÇÕES DO PERFIL ---
    window.saveProfile = async () => {
        const n = document.getElementById('new-name').value;
        const f = document.getElementById('new-pic').value;
        const up = {};
        if(n) up.nome = n;
        if(f) up.foto = f;
        await update(ref(db, `jogadores/${uLog.id}`), up);
        document.getElementById('edit-mode').classList.add('hidden');
        alert("Dados Acadêmicos Atualizados.");
    }

    window.deleteAccount = async () => {
        if(confirm("⚠️ ATENÇÃO: Deseja apagar sua matrícula? Esta ação é irreversível e você perderá todo seu saldo Sovereign.")){
            await remove(ref(db, `jogadores/${uLog.id}`));
            deleteUser(auth.currentUser).then(() => location.reload());
        }
    }

    // --- RANKING ---
    function carregarRanking() {
        onValue(ref(db, 'jogadores'), snap => {
            let h = "";
            let list = [];
            snap.forEach(child => { list.push(child.val()) });
            list.sort((a,b) => b.saldo - a.saldo).slice(0, 10).forEach((p, i) => {
                h += `<div class="card" style="display:flex; justify-content:space-between; align-items:center; padding: 10px 20px;">
                        <span><b>#${i+1}</b> ${p.nome}</span>
                        <span style="color:var(--gold); font-weight:700">$ ${p.saldo.toLocaleString()}</span>
                      </div>`;
            });
            document.getElementById('ranking-list').innerHTML = h;
        });
    }

</script>
</body>
</html>
