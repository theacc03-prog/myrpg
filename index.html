<!-- SOMENTE TRECHO PRINCIPAL ATUALIZADO (JS + CORREÇÕES) -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
import { getDatabase, ref, set, get, update, onValue, push } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

const firebaseConfig = { /* SEU CONFIG */ };

const app_init = initializeApp(firebaseConfig);
const auth = getAuth(app_init);
const db = getDatabase(app_init);

// STATUS FINANCEIRO
function getStatus(saldo){
    if(saldo <= 100) return "💸 Pobretão da ERA";
    if(saldo <= 500) return "🧃 Estudante Endividado";
    if(saldo <= 1500) return "📚 Sobrevivendo com dignidade";
    if(saldo <= 5000) return "💼 Investidor Promissor";
    return "👑 Magnata Acadêmico";
}

window.app = {

handleLogin(){
    signInWithEmailAndPassword(auth,
        email.value, pass.value
    ).catch(e=>alert(e.message));
},

handleRegister(){
    createUserWithEmailAndPassword(auth,
        reg_email.value, reg_pass.value
    ).then(res=>{
        set(ref(db,'jogadores/'+res.user.uid),{
            nome: reg_name.value,
            saldo:1500,
            role:'aluno',
            foto:'',
            bio:'',
            divida:0
        });
    });
},

handleLogout(){
    signOut(auth);
},

updateProfile(){
    update(ref(db,'jogadores/'+auth.currentUser.uid),{
        foto:set_foto.value,
        bio:set_bio.value
    });
},

// EDITORIAL CORRIGIDO
admPostNews(){
    push(ref(db,'editorial'),{
        titulo: adm_n_t.value,
        img: adm_n_i.value,
        texto: adm_n_x.value
    });
},

// MERCADO + NOTIFICAÇÃO GLOBAL
admAddItem(){
    const item = {
        nome: mi_nome.value,
        preco: parseInt(mi_preco.value),
        img: mi_img.value,
        desc: mi_desc.value
    };

    const notif = [
        "🚨 Novo item chegou no mercado. Corre antes que vire história!",
        "💎 Oportunidade rara detectada no mercado da ERA",
        "🛍️ Novo produto disponível… será que você consegue pagar?"
    ];

    push(ref(db,'loja'), item);

    onValue(ref(db,'jogadores'), snap=>{
        snap.forEach(c=>{
            push(ref(db,`jogadores/${c.key}/notificacoes`),{
                msg: notif[Math.floor(Math.random()*notif.length)]
            });
        });
    });

    push(ref(db,'auditoria'),{
        msg: "ADM criou item "+item.nome
    });
},

// TRANSFERÊNCIA SEM TAG
transferir(){
    const val = parseInt(tr_val.value);
    const dest = tr_dest.value;

    if(val<=0) return;

    get(ref(db,'jogadores/'+dest)).then(snap=>{
        const d = snap.val();

        update(ref(db,'jogadores/'+auth.currentUser.uid),{
            saldo: user.saldo - val
        });

        update(ref(db,'jogadores/'+dest),{
            saldo: d.saldo + val
        });

        push(ref(db,'auditoria'),{
            msg: `${user.nome} transferiu $${val} para ${d.nome}`
        });
    });
}

};

// AUTH + LOAD
let user;

onAuthStateChanged(auth, u=>{
if(u){
    onValue(ref(db,'jogadores/'+u.uid), snap=>{
        user = snap.val();

        u_nome.innerText = user.nome;
        u_saldo.innerText = "$ "+user.saldo;
        u_bio.innerText = user.bio || "";
        u_foto.src = user.foto || "https://placehold.co/150";

        document.getElementById("u-status").innerText = getStatus(user.saldo);
    });

    // EDITORIAL FIX
    onValue(ref(db,'editorial'), snap=>{
        let html="";
        snap.forEach(c=>{
            const n = c.val();
            html += `
            <div class="card">
                ${n.img ? `<img src="${n.img}" style="width:100%">` : ""}
                <h3>${n.titulo}</h3>
                <p>${n.texto}</p>
            </div>`;
        });

        news_list.innerHTML = html || "nada novo por aqui, pequena borboleta";
    });

}
});

</script>
