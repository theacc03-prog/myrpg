<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERA UNIVERSITY | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #050A14; --card-bg: #0D1B2A; --gold: #C5A059; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--navy); font-family: 'Montserrat', sans-serif; margin: 0; color: #fff; line-height: 1.6; }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); position: relative; }
        header h1 { font-size: 1.5em; color: var(--gold); font-family: 'Cinzel'; margin: 0; letter-spacing: 5px; }
        .logout-btn { position: absolute; right: 15px; top: 22px; background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; font-size: 8px; border-radius: 4px; cursor: pointer; }
        .tabs { display: flex; overflow-x: auto; gap: 5px; padding: 12px; background: rgba(0,0,0,0.95); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--gold); }
        .tab-btn { background: transparent; color: #fff; border: none; padding: 12px 18px; border-radius: 4px; font-size: 9px; cursor: pointer; white-space: nowrap; opacity: 0.5; }
        .tab-btn.active { opacity: 1; color: var(--gold); border-bottom: 1px solid var(--gold); }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; display: none; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--glass); position: relative; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #1a2233; background: #000; color: #fff; font-size: 11px; box-sizing: border-box; }
        button { background: var(--gold); color: #000; border: none; padding: 14px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 700; font-size: 9px; text-transform: uppercase; margin-top: 5px; }
        .profile-pic { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <h1>ERA BANK</h1>
    <button id="main-logout" class="logout-btn" style="display:none">SAIR</button>
</header>

<div id="auth-screen" style="padding: 80px 20px; text-align: center;">
    <div class="card" style="max-width:320px; margin: 0 auto;">
        <h2 style="font-family:'Playfair Display'">Elite Access</h2>
        <div id="reg-fields" style="display:none"><input type="text" id="reg-nome" placeholder="Nome do Personagem"></div>
        <input type="email" id="u-email" placeholder="E-mail">
        <input type="password" id="u-pass" placeholder="Password">
        <button id="btn-submit-auth">Entrar</button>
        <button id="btn-toggle-reg" style="background:none; color:var(--gold); font-size:10px; margin-top:10px">Novo Registro</button>
    </div>
</div>

<div class="container" id="main-app">
    <div class="tabs">
        <button class="tab-btn active" data-tab="home">CONTA</button>
        <button class="tab-btn" data-tab="news">EDITORIAL</button>
        <button class="tab-btn" data-tab="loja">MERCADO</button>
        <button class="tab-btn" id="adm-btn" style="display:none" data-tab="adm">REITORIA</button>
    </div>

    <div id="home" class="section active">
        <div class="card" style="text-align: center;">
            <button id="open-edit" style="position:absolute; right:15px; top:15px; background:none; border:none; color:var(--gold); font-size:16px; cursor:pointer">⚙️</button>
            <img id="my-pic" src="https://placehold.co/150" class="profile-pic">
            <h2 id="my-name">...</h2>
            <p id="my-bio" style="font-size:10px; opacity:0.7"></p>
            <div id="my-balance" style="font-size:2.5em; font-family:'Playfair Display';">$ 0</div>
        </div>
    </div>

    <div id="news" class="section"><div id="news-feed"></div></div>
    <div id="loja" class="section"><div id="shop-grid"></div></div>

    <div id="adm" class="section">
        <div class="card">
            <h3>CADASTRAR ITEM</h3>
            <input type="text" id="it-nome" placeholder="Nome">
            <input type="number" id="it-preco" placeholder="Preço">
            <button id="btn-add-item">Salvar Item</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
    import { getDatabase, ref, set, get, update, onValue, push } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBt7zjlI1P8lN4JxnxTe_erzNbfu1AHdfE",
        authDomain: "universityerarpg-6a29d.firebaseapp.com",
        databaseURL: "https://universityerarpg-6a29d-default-rtdb.firebaseio.com",
        projectId: "universityerarpg-6a29d",
        storageBucket: "universityerarpg-6a29d.firebasestorage.app",
        messagingSenderId: "912095174573",
        appId: "1:912095174573:web:e4591c65eeb9259ba9cb24"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Seletores
    const btnSubmit = document.getElementById('btn-submit-auth');
    const btnToggle = document.getElementById('btn-toggle-reg');
    const regFields = document.getElementById('reg-fields');

    // Troca Login/Registro
    btnToggle.onclick = () => {
        regFields.style.display = regFields.style.display === 'none' ? 'block' : 'none';
        btnSubmit.innerText = regFields.style.display === 'none' ? 'Entrar' : 'Registrar';
    };

    // Ação de Auth
    btnSubmit.onclick = async () => {
        const email = document.getElementById('u-email').value;
        const pass = document.getElementById('u-pass').value;

        if (regFields.style.display === 'block') {
            const nome = document.getElementById('reg-nome').value;
            try {
                const r = await createUserWithEmailAndPassword(auth, email, pass);
                await set(ref(db, 'jogadores/' + r.user.uid), { nome, saldo: 1500, role: 'player', bio: "" });
                alert("Conta criada!");
            } catch (e) { alert("Erro: " + e.message); }
        } else {
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert("Falha no login."); }
        }
    };

    // Monitor de Estado
    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('main-logout').style.display = 'block';
            
            onValue(ref(db, 'jogadores/' + user.uid), s => {
                const d = s.val();
                if(d) {
                    document.getElementById('my-name').innerText = d.nome;
                    document.getElementById('my-balance').innerText = `$ ${d.saldo}`;
                    if(d.role === 'admin') document.getElementById('adm-btn').style.display = 'block';
                }
            });
        } else {
            document.getElementById('auth-screen').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    document.getElementById('main-logout').onclick = () => signOut(auth);

    // Navegação de Tabs
    document.querySelectorAll('.tab-btn').forEach(b => {
        b.onclick = () => {
            document.querySelectorAll('.section, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(b.dataset.tab).classList.add('active');
            b.classList.add('active');
        };
    });
</script>
</body>
</html>
